<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXTELL FAN — Industrial-Grade Ceiling & Mobile Fans</title>
  <meta name="description" content="AXTELL FAN manufactures industrial ceiling fans, mobile fans, and accessories. Massive coverage, low noise, energy efficient." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />
  <style>
    /* ---------- Reset ---------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: var(--header-h);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img {
      max-width: 100%;
      display: block;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
    }
    ul {
      list-style: none;
    }
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* ---------- Tokens ---------- */
    :root {
      --bg-dark: #1f3a52;
      --bg-dark-2: #28486a;
      --bg-dark-3: #335880;
      --bg-light: #f5f7fa;
      --bg-light-2: #ffffff;
      --accent: #f5c542;
      --accent-dark: #e0a82e;
      --accent-soft: rgba(245, 197, 66, 0.16);
      --text-light: #ffffff;
      --text-light-2: #d8e4f0;
      --text-light-3: #a4b5c7;
      --text-dark: #1a1a2e;
      --text-dark-2: #4a5563;
      --border-dark: rgba(255, 255, 255, 0.14);
      --border-light: #e3e8ef;
      --success: #2ecc71;
      --error: #e74c3c;
      --warning: #f39c12;
      --shadow-lg: 0 24px 60px -20px rgba(0, 0, 0, 0.55);
      --shadow-md: 0 12px 30px -12px rgba(0, 0, 0, 0.35);
      --shadow-sm: 0 4px 14px -4px rgba(0, 0, 0, 0.25);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --header-h: 72px;
      --maxw: 1200px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ---------- Layout ---------- */
    .container {
      width: 100%;
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 24px;
    }
    .section {
      padding: 96px 0;
      position: relative;
    }
    .section--light {
      background: var(--bg-light);
      color: var(--text-dark);
    }
    .section--dark {
      background: var(--bg-dark-2);
      color: var(--text-light);
    }
    .section-head {
      max-width: 720px;
      margin: 0 auto 56px;
      text-align: center;
    }
    .section-head .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .section-head h2 {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .section-head p {
      font-size: 17px;
      color: var(--text-dark-2);
    }
    .section--dark .section-head p {
      color: var(--text-light-2);
    }
    .text-accent {
      color: var(--accent);
    }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
    }
    .btn--primary {
      background: var(--accent);
      color: var(--bg-dark);
    }
    .btn--primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px -8px rgba(232, 184, 48, 0.5);
    }
    .btn--ghost {
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      color: var(--text-light);
    }
    .btn--ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .btn--dark {
      background: var(--bg-dark);
      color: var(--text-light);
    }
    .btn--dark:hover {
      background: #0d1820;
      transform: translateY(-2px);
    }

    /* ---------- Animations ---------- */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
    }
    .reveal.in {
      opacity: 1;
      transform: none;
    }
    .reveal[data-delay="1"] {
      transition-delay: 0.08s;
    }
    .reveal[data-delay="2"] {
      transition-delay: 0.16s;
    }
    .reveal[data-delay="3"] {
      transition-delay: 0.24s;
    }
    .reveal[data-delay="4"] {
      transition-delay: 0.32s;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .fan-blades {
        animation: none;
      }
      .scroll-cue .mouse::after {
        animation: none;
      }
      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
      html {
        scroll-behavior: auto;
      }
    }

    /* ---------- Header ---------- */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-h);
      display: flex;
      align-items: center;
      background: transparent;
      transition: background 0.35s var(--ease), box-shadow 0.35s var(--ease), border-color 0.35s var(--ease);
      border-bottom: 1px solid transparent;
    }
    .header.scrolled {
      background: rgba(22, 36, 47, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom-color: var(--border-dark);
      box-shadow: 0 6px 24px -12px rgba(0, 0, 0, 0.6);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 1px;
    }
    .brand .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: grid;
      place-items: center;
      color: var(--bg-dark);
      font-size: 18px;
      box-shadow: 0 6px 16px -6px rgba(232, 184, 48, 0.6);
    }
    .brand span {
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-links>li>a,
    .nav-links>li>button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-light-2);
      border-radius: var(--radius-sm);
      transition: color 0.2s var(--ease), background 0.2s var(--ease);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .nav-links>li>a:hover,
    .nav-links>li>button:hover {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.04);
    }
    .nav-links .active {
      color: var(--accent);
    }
    .has-dropdown {
      position: relative;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg-dark-3);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-md);
      min-width: 220px;
      padding: 8px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s var(--ease), transform 0.22s var(--ease);
    }
    .has-dropdown.open .dropdown,
    .has-dropdown:hover .dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .dropdown a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      font-size: 14.5px;
      color: var(--text-light-2);
      transition: background 0.18s var(--ease), color 0.18s var(--ease);
    }
    .dropdown a i {
      width: 18px;
      color: var(--accent);
    }
    .dropdown a:hover {
      background: rgba(232, 184, 48, 0.1);
      color: var(--text-light);
    }
    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-toggle {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      color: var(--text-light);
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .nav-links,
      .nav-cta .btn {
        display: none;
      }
      .nav-toggle {
        display: grid;
        place-items: center;
      }
      .nav-links.mobile-open {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg-dark-2);
        padding: 20px 24px;
        overflow-y: auto;
        border-top: 1px solid var(--border-dark);
      }
      .nav-links.mobile-open>li {
        width: 100%;
      }
      .nav-links.mobile-open>li>a,
      .nav-links.mobile-open>li>button {
        width: 100%;
        justify-content: space-between;
        padding: 16px 12px;
        border-bottom: 1px solid var(--border-dark);
      }
      .nav-links.mobile-open .dropdown {
        position: static;
        transform: none;
        opacity: 1;
        visibility: visible;
        box-shadow: none;
        background: transparent;
        border: none;
        padding: 0 0 0 16px;
        min-width: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s var(--ease);
      }
      .nav-links.mobile-open .has-dropdown.open .dropdown {
        max-height: 80vh;
        padding: 4px 0 8px 16px;
      }
      .nav-links.mobile-open .dropdown a {
        border-bottom: 1px solid var(--border-dark);
      }
    }

    /* ---------- Hero ---------- */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: radial-gradient(ellipse at 70% 30%, #243a4d 0%, var(--bg-dark) 55%, #0f1a23 100%);
      overflow: hidden;
      padding-top: var(--header-h);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.04) 1px, transparent 0);
      background-size: 28px 28px;
      opacity: 0.6;
      pointer-events: none;
    }
    .hero-inner {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 48px;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .hero-copy .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: var(--accent-soft);
      border: 1px solid rgba(232, 184, 48, 0.3);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(34px, 5.4vw, 60px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }
    .hero h1 .accent {
      color: var(--accent);
    }
    .hero p.lead {
      font-size: clamp(16px, 1.8vw, 19px);
      color: var(--text-light-2);
      max-width: 540px;
      margin-bottom: 36px;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 48px;
    }
    .hero-stats {
      display: flex;
      gap: 36px;
      flex-wrap: wrap;
      padding-top: 28px;
      border-top: 1px solid var(--border-dark);
    }
    .hero-stats .stat .num {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .hero-stats .stat .label {
      font-size: 13px;
      color: var(--text-light-3);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .fan-stage {
      display: grid;
      place-items: center;
      position: relative;
    }
    .fan-glow {
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 225, 232, 0.14), transparent 65%);
      filter: blur(8px);
    }
    .fan {
      position: relative;
      width: min(420px, 80vw);
      aspect-ratio: 1;
    }
    .fan-hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 11%;
      height: 11%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f7d95a, #e0a82e 55%, #c4911a);
      border: 2px solid #f5c542;
      z-index: 5;
      box-shadow: 0 0 0 4px rgba(245, 197, 66, 0.2), inset 0 0 12px rgba(0, 0, 0, 0.2);
    }
    .fan-blades {
      position: absolute;
      inset: 0;
      animation: spin 4s linear infinite;
      transform-origin: center;
    }
    .blade {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 47%;
      height: 6%;
      transform-origin: 0% 50%;
    }
    .blade::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 2px 50% 50% 2px;
      background: linear-gradient(180deg, #eef1f4, #c5cdd6 55%, #9aa3ad);
      border: 1px solid rgba(180, 190, 200, 0.5);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
    }
    .blade:nth-child(1) {
      transform: rotate(0deg);
    }
    .blade:nth-child(2) {
      transform: rotate(72deg);
    }
    .blade:nth-child(3) {
      transform: rotate(144deg);
    }
    .blade:nth-child(4) {
      transform: rotate(216deg);
    }
    .blade:nth-child(5) {
      transform: rotate(288deg);
    }
    .fan-ring {
      position: absolute;
      inset: 0;
      border: 2px dashed rgba(200, 210, 220, 0.22);
      border-radius: 50%;
    }
    .scroll-cue {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-light-3);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 3;
    }
    .scroll-cue .mouse {
      width: 24px;
      height: 38px;
      border: 2px solid var(--text-light-3);
      border-radius: 14px;
      position: relative;
    }
    .scroll-cue .mouse::after {
      content: "";
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
      animation: wheel 1.6s infinite;
    }
    @keyframes wheel {
      0% {
        opacity: 1;
        top: 7px;
      }
      100% {
        opacity: 0;
        top: 20px;
      }
    }
    @media (max-width: 768px) {
      .hero {
        min-height: auto;
        padding: calc(var(--header-h) + 40px) 0 80px;
      }
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }
      .hero-copy .badge,
      .hero-actions {
        justify-content: center;
      }
      .hero p.lead {
        margin-left: auto;
        margin-right: auto;
      }
      .hero-stats {
        justify-content: center;
        gap: 28px;
      }
      .fan {
        width: min(320px, 70vw);
      }
    }
    @media (max-width: 560px) {
      .hero-stats {
        gap: 20px;
      }
      .hero-stats .stat .num {
        font-size: 24px;
      }
    }

    /* ---------- Features ---------- */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    .feature-card {
      background: var(--bg-light-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 32px 26px;
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
    }
    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
    .feature-card .ico {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      display: grid;
      place-items: center;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .feature-card h3 {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-dark);
    }
    .feature-card p {
      font-size: 14.5px;
      color: var(--text-dark-2);
    }
    @media (max-width: 1024px) {
      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 560px) {
      .features-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- Products ---------- */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14.5px;
      font-weight: 600;
      border: 1.5px solid var(--border-dark);
      color: var(--text-light-2);
      transition: all 0.22s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      cursor: pointer;
      font-family: inherit;
    }
    .tab:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .tab.active {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }
    .tab .count {
      font-size: 12px;
      opacity: 0.7;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }
    .product-card {
      background: var(--bg-dark-3);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-lg);
      padding: 26px 22px;
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }
    .product-card .p-ico {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: var(--radius-md);
      margin-bottom: 18px;
      background: linear-gradient(135deg, #243447, #1a2a3a);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 44px;
      border: 1px solid var(--border-dark);
      overflow: hidden;
      position: relative;
    }
    .product-card .p-ico img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s var(--ease);
    }
    .product-card:hover .p-ico img {
      transform: scale(1.02);
    }
    .product-card .p-ico i {
      font-size: 44px;
    }
    .product-card .p-cat {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .product-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .product-card .p-specs {
      font-size: 13.5px;
      color: var(--text-light-3);
      margin-bottom: 16px;
      flex-grow: 1;
    }
    .product-card .p-specs li {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px dashed var(--border-dark);
    }
    .product-card .p-specs li:last-child {
      border-bottom: none;
    }
    .product-card .p-specs li span:last-child {
      color: var(--text-light-2);
      font-weight: 500;
    }
    .product-card .p-link {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .product-card .p-link:hover {
      gap: 10px;
    }
    .accessory-card .p-ico {
      aspect-ratio: auto;
      height: 110px;
      font-size: 38px;
    }
    .accessory-card .p-desc {
      font-size: 13.5px;
      color: var(--text-light-3);
      margin-bottom: 16px;
      flex-grow: 1;
    }
    @media (max-width: 1024px) {
      .product-grid {

      function $(sel, ctx = document) { return ctx.querySelector(sel); }

      function sortData(data, key, type, dir = 'asc') {
        const sorted = [...data];
        sorted.sort((a, b) => {
          let va = a[key],
            vb = b[key];
          if (type === 'number') { va = Number(va) || 0;
            vb = Number(vb) || 0; return dir === 'asc' ? va - vb : vb - va; }
          va = String(va);
          vb = String(vb);
          return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        });
        return sorted;
      }


      // ============================================================

      function useReveal(selector = '.reveal', options = {}) {
        const defaultOptions = { threshold: 0.12, rootMargin: '0px 0px -40px 0px' };
        const config = { ...defaultOptions, ...options };
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('in');
              observer.unobserve(entry.target);
            }
          });
        }, config);
        const els = document.querySelectorAll(selector);
        els.forEach(el => observer.observe(el));
        return {
          observe: (el) => observer.observe(el),
          observeAll: (els) => els.forEach(el => observer.observe(el)),
          disconnect: () => observer.disconnect()
        };
      }

      function useScrollHeader(selector = '#header') {
        const header = document.querySelector(selector);
        if (!header) return;
        let ticking = false;

        function update() {
          header.classList.toggle('scrolled', window.scrollY > 30);
          ticking = false;
        }

        function onScroll() {
          if (!ticking) { window.requestAnimationFrame(update);
            ticking = true; }
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => window.removeEventListener('scroll', onScroll);
      }

      function useMobileMenu(toggleSelector, menuSelector) {
        const toggle = document.querySelector(toggleSelector);
        const menu = document.querySelector(menuSelector);
        if (!toggle || !menu) return;
        const icon = toggle.querySelector('i');
        toggle.addEventListener('click', () => {
          const open = menu.classList.toggle('mobile-open');
          toggle.setAttribute('aria-expanded', String(open));
          if (icon) icon.className = open ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
        });
        document.addEventListener('click', (e) => {
          if (window.innerWidth <= 768 && !menu.contains(e.target) && !toggle.contains(e.target)) {
            menu.classList.remove('mobile-open');
            toggle.setAttribute('aria-expanded', 'false');
            if (icon) icon.className = 'fa-solid fa-bars';
          }
        });
        menu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            menu.classList.remove('mobile-open');
            toggle.setAttribute('aria-expanded', 'false');
            if (icon) icon.className = 'fa-solid fa-bars';
          });
        });
        const productsNav = document.querySelector('#productsNav');
        if (productsNav) {
          const btn = productsNav.querySelector('button');
          btn?.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
              e.stopPropagation();
              productsNav.classList.toggle('open');
              btn.setAttribute('aria-expanded', String(productsNav.classList.contains('open')));
            }
          });
        }
      }

                <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
                  <i class="fa-solid fa-bars" aria-hidden="true"></i>
                </button>
              </div>
            </nav>
          </div>
        `;
        return header;
      }

      function Hero() {
        const section = document.createElement('section');
        section.id = 'home';
        section.className = 'hero';
        section.innerHTML = `
          <div class="container">
            <div class="hero-inner">
              <div class="hero-copy">
                <span class="badge"><i class="fa-solid fa-bolt" aria-hidden="true"></i> Industrial-Grade Performance</span>
                <h1>Massive Coverage.<br><span class="accent">Ultra-Low Noise.</span><br>Energy Efficient.</h1>
                <p class="lead">AXTELL industrial fans deliver powerful airflow across the largest facilities — built rugged, engineered quiet, and designed to cut your energy bill.</p>
                <div class="hero-actions">
                  <a href="#products" class="btn btn--primary">View Products <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></a>
                  <a href="#contact" class="btn btn--ghost">Contact Us</a>
                </div>
                <div class="hero-stats">
                  <div class="stat"><div class="num">7.3m</div><div class="label">Max Diameter</div></div>
                  <div class="stat"><div class="num">1.5kW</div><div class="label">Max Power</div></div>
                  <div class="stat"><div class="num">2,500m²</div><div class="label">Coverage</div></div>
                  <div class="stat"><div class="num">38dB</div><div class="label">Min Noise</div></div>
                </div>
              </div>
              <div class="fan-stage">
                <div class="fan-glow" aria-hidden="true"></div>
                <div class="fan" aria-hidden="true">
                  <div class="fan-ring"></div>
                  <div class="fan-blades">
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
                  </div>
                  <div class="fan-hub"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="scroll-cue" aria-hidden="true">
            <div class="mouse"></div>
            <span>Scroll</span>
          </div>
        `;
        return section;
      }

      function Features() {
        const section = document.createElement('section');
        section.id = 'features';
        section.className = 'section section--light';
        let cards = '';
        FEATURES.forEach((f, i) => {
          cards += `
            <div class="feature-card reveal" data-delay="${(i % 4) + 1}">
              <div class="ico"><i class="fa-solid ${f.icon}" aria-hidden="true"></i></div>
              <h3>${f.title}</h3>
              <p>${f.desc}</p>
            </div>
          `;
        });
        section.innerHTML = `
          <div class="container">
            <div class="section-head reveal">
              <span class="eyebrow">Why AXTELL</span>
              <h2>Engineered for Demanding Environments</h2>
              <p>Every AXTELL fan is built around four core promises — so your facility stays cool, comfortable, and productive.</p>
            </div>
            <div class="features-grid">${cards}</div>
          </div>
        `;
        return section;
      }

      function Products() {
        const section = document.createElement('section');
        section.id = 'products';
        section.className = 'section section--dark';

        const CAT_LABEL = { ceiling: 'Ceiling Fan', mobile: 'Mobile Fan', accessory: 'Accessory' };
        const CAT_ICON = { ceiling: 'fa-fan', mobile: 'fa-truck-medical', accessory: 'fa-screwdriver-wrench' };
        const TAB_CONFIGS = [
          { id: 'ceiling', label: 'Ceiling Fan', icon: 'fa-fan', data: CEILING_FANS },
          { id: 'mobile', label: 'Mobile Fan', icon: 'fa-truck-medical', data: MOBILE_FANS },
          { id: 'accessory', label: 'Accessories', icon: 'fa-screwdriver-wrench', data: ACCESSORIES }
        ];

        let activeFilter = 'ceiling';

        const container = document.createElement('div');
        container.className = 'container';

        const head = document.createElement('div');
        head.className = 'section-head reveal';
        head.innerHTML =
          `<span class="eyebrow">Our Products</span><h2>Find the Right Fan for Your Facility</h2><p>Browse our full range of industrial ceiling fans, mobile fans, and accessories.</p>`;
        container.appendChild(head);

        const tabsWrapper = document.createElement('div');
        tabsWrapper.className = 'tabs reveal';
        tabsWrapper.setAttribute('role', 'tablist');
        TAB_CONFIGS.forEach(cfg => {
          const btn = document.createElement('button');
          btn.className = 'tab' + (cfg.id === activeFilter ? ' active' : '');
          btn.dataset.filter = cfg.id;
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-selected', cfg.id === activeFilter ? 'true' : 'false');
          btn.innerHTML =
            `<i class="fa-solid ${cfg.icon}" aria-hidden="true"></i> ${cfg.label} <span class="count">${cfg.data.length}</span>`;
          tabsWrapper.appendChild(btn);
        });
        container.appendChild(tabsWrapper);

        const grid = document.createElement('div');
        grid.className = 'product-grid';
        grid.id = 'productGrid';
        container.appendChild(grid);
        section.appendChild(container);

        function productCard(data) {
          const el = document.createElement('article');
          el.className = 'product-card reveal';
          const cat = data._cat || 'ceiling';
          const imgHtml = data.image ?
            `<img src="${data.image}" alt="${data.model}" loading="lazy" />` :
            `<i class="fa-solid ${CAT_ICON[cat]}" aria-hidden="true"></i>`;
          el.innerHTML = `
            <div class="p-ico">${imgHtml}</div>
            <div class="p-cat">${CAT_LABEL[cat]}</div>
            <h3>${data.model}</h3>
            <ul class="p-specs">
              <li><span>Diameter</span><span>${data.diameter} m</span></li>
              <li><span>Power</span><span>${data.power} kW</span></li>
              <li><span>Airflow</span><span>${data.airflow} m³/min</span></li>
              <li><span>Noise</span><span>${data.noise} dB</span></li>
            </ul>
            <a class="p-link" href="#specs">View specs <i class="fa-solid fa-arrow-right-long" aria-hidden="true"></i></a>
          `;
          return el;
        }

        function accessoryCard(data) {
          const el = document.createElement('article');
          el.className = 'product-card accessory-card reveal';
          const imgHtml = data.image ?
            `<img src="${data.image}" alt="${data.model}" loading="lazy" />` :
            `<i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i>`;
          el.innerHTML = `
            <div class="p-ico">${imgHtml}</div>
            <div class="p-cat">Accessory</div>
            <h3>${data.model}</h3>
            <p class="p-desc">${data.desc}</p>
            <a class="p-link" href="#contact">Enquire <i class="fa-solid fa-arrow-right-long" aria-hidden="true"></i></a>
          `;
          return el;
        }

        function render(filter) {
          grid.innerHTML = '';
          const config = TAB_CONFIGS.find(c => c.id === filter);
          if (!config) return;
          const isAccessory = filter === 'accessory';
          config.data.forEach(item => {
            const card = isAccessory ? accessoryCard(item) : productCard(item);
            if (!isAccessory) {
              item._cat = filter;
            }
            grid.appendChild(card);
          });
        }

        tabsWrapper.addEventListener('click', (e) => {
          const btn = e.target.closest('.tab');
          if (!btn) return;
          const filter = btn.dataset.filter;
          if (filter === activeFilter) return;
          tabsWrapper.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.dataset.filter === filter);
            t.setAttribute('aria-selected', t.dataset.filter === filter ? 'true' : 'false');
          });
          activeFilter = filter;
          render(filter);
          section.scrollIntoView({ behavior: 'smooth' });
        });

        render(activeFilter);
        section._setFilter = (filter) => {
          const btn = tabsWrapper.querySelector(`.tab[data-filter="${filter}"]`);
          if (btn) btn.click();
        };
        return section;
      }

      function Specifications() {
        const section = document.createElement('section');
        section.id = 'specs';
        section.className = 'section section--light';

        let rows = CEILING_FANS.map(f => ({ category: 'Ceiling', ...f }));
        let sortState = { key: null, dir: null };

        const container = document.createElement('div');
        container.className = 'container';

        const head = document.createElement('div');
        head.className = 'section-head reveal';
        head.innerHTML =
          `<span class="eyebrow">Technical Data</span><h2>Full Specifications</h2><p>Compare every model side by side. Click any column header to sort the table.</p>`;
        container.appendChild(head);

        const wrap = document.createElement('div');
        wrap.className = 'spec-wrap reveal';
        const table = document.createElement('table');
        table.className = 'spec-table';

        const columns = [
          { key: 'category', label: 'Category', type: 'string' },
          { key: 'model', label: 'Model', type: 'string' },
          { key: 'diameter', label: 'Diameter (ft)', type: 'number' },
          { key: 'power', label: 'Power (kW)', type: 'number' },
          { key: 'speed', label: 'Speed (RPM)', type: 'number' },
          { key: 'airflow', label: 'Airflow (m³/min)', type: 'number' },
          { key: 'noise', label: 'Noise (dB)', type: 'number' },
          { key: 'weight', label: 'Weight (kg)', type: 'number' }
        ];

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        columns.forEach(col => {
          const th = document.createElement('th');
          th.dataset.key = col.key;
          th.dataset.type = col.type;
          th.innerHTML = `${col.label} <span class="sort-ico"><i class="fa-solid fa-sort" aria-hidden="true"></i></span>`;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        tbody.id = 'specBody';
        table.appendChild(tbody);

        const tfoot = document.createElement('tfoot');
        const footRow = document.createElement('tr');
        const footCell = document.createElement('td');
        footCell.colSpan = 8;
        footCell.textContent =
          '* All listed models are Ceiling Fan series. Mobile Fan and Accessories specifications are available on request.';
        footRow.appendChild(footCell);
        tfoot.appendChild(footRow);
        table.appendChild(tfoot);

        wrap.appendChild(table);
        container.appendChild(wrap);
        section.appendChild(container);

        function renderSpecs(data) {
          tbody.innerHTML = '';
          data.forEach(r => {
            const tr = document.createElement('tr');
            const cls = r.category.toLowerCase();
            tr.innerHTML = `
              <td><span class="cat-pill ${cls}">${r.category}</span></td>
              <td><strong>${r.model}</strong></td>
              <td>${r.diameter || '—'}</td>
              <td>${r.power ? r.power.toFixed(2) : '—'}</td>
              <td>${r.speed || '—'}</td>
              <td>${r.airflow || '—'}</td>
              <td>${r.noise || '—'}</td>
              <td>${r.weight ? r.weight.toFixed(1) : '—'}</td>
            `;
            tbody.appendChild(tr);
          });
        }
        renderSpecs(rows);

        thead.addEventListener('click', (e) => {
          const th = e.target.closest('th');
          if (!th) return;
          const key = th.dataset.key;
          const type = th.dataset.type;
          let dir = 'asc';
          if (sortState.key === key && sortState.dir === 'asc') dir = 'desc';
          sortState = { key, dir };
          const sorted = sortData(rows, key, type, dir);
          renderSpecs(sorted);
          thead.querySelectorAll('th').forEach(t => {
            t.classList.remove('sorted-asc', 'sorted-desc');
            t.querySelector('.sort-ico').innerHTML = '<i class="fa-solid fa-sort" aria-hidden="true"></i>';
          });
          th.classList.add(dir === 'asc' ? 'sorted-asc' : 'sorted-desc');
          th.querySelector('.sort-ico').innerHTML =
            `<i class="fa-solid fa-sort-${dir === 'asc' ? 'up' : 'down'}" aria-hidden="true"></i>`;
        });

        return section;
      }

      function Applications() {
        const section = document.createElement('section');
        section.id = 'application';
        section.className = 'section section--dark';
        let cards = '';
        APPLICATIONS.forEach((a, i) => {
          const imgHtml = a.image ?
            `<img src="${a.image}" alt="${a.title}" loading="lazy" />` :
            `<i class="fa-solid ${a.icon}" aria-hidden="true"></i>`;
          cards += `
            <article class="app-card reveal" data-delay="${(i % 3) + 1}">
              <div class="app-img">${imgHtml}</div>
              <div class="app-body">
                <h3>${a.title}</h3>
                <p>${a.text}</p>
              </div>
            </article>
          `;
        });
        section.innerHTML = `
          <div class="container">
            <div class="section-head reveal">
              <span class="eyebrow">Applications</span>
              <h2>Built for Every Industrial Space</h2>
              <p>From heavy manufacturing to public venues, AXTELL fans keep air moving where it matters most.</p>
            </div>
            <div class="app-grid">${cards}</div>
          </div>
        `;
        return section;
      }

      function Contact() {
        const section = document.createElement('section');
        section.id = 'contact';
        section.className = 'section section--light';
        section.innerHTML = `
          <div class="container">
            <div class="section-head reveal">
              <span class="eyebrow">Get in Touch</span>
              <h2>Request a Quote</h2>
              <p>Tell us about your facility and our engineers will recommend the right fan configuration.</p>
            </div>
            <div class="contact-grid">
              <div class="contact-info reveal">
                <h3>Let's talk about your project</h3>
                <p>Our team responds within one business day. For urgent enquiries, call us directly during business hours.</p>
                <ul class="contact-list">
                  <li>
                    <div class="ico"><i class="fa-solid fa-location-dot" aria-hidden="true"></i></div>
                    <div class="meta">
                      <div class="l">Address</div>
                      <div class="v">5211 Co Rd 597, Farmersville, TX 75442</div>
                    </div>
                  </li>
                  <li>
                    <div class="ico"><i class="fa-solid fa-phone" aria-hidden="true"></i></div>
                    <div class="meta">
                      <div class="l">Phone</div>
                      <div class="v"><a href="tel:+19728075555">(972) 807 5555</a></div>
                    </div>
                  </li>
                  <li>
                    <div class="ico"><i class="fa-solid fa-envelope" aria-hidden="true"></i></div>
                    <div class="meta">
                      <div class="l">Email</div>
                      <div class="v"><a href="mailto:sales@axtell.us">sales@axtell.us</a></div>
                    </div>
                  </li>
                </ul>
                <div class="social-row" aria-label="Social media">
                  <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f" aria-hidden="true"></i></a>
                  <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
                  <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube" aria-hidden="true"></i></a>
                  <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>
                </div>
              </div>
              <form class="contact-form reveal" id="contactForm" novalidate>
                <div class="form-success" id="formSuccess">
                  <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                  <span>Thanks! Your enquiry has been received — we'll reply within one business day.</span>
                </div>
                <div class="form-row">
                  <div class="field">
                    <label for="name">Full Name <span class="req">*</span></label>
                    <input type="text" id="name" name="name" autocomplete="name" required />
                    <span class="err-msg">Please enter your full name.</span>
                  </div>
                  <div class="field">
                    <label for="email">Email <span class="req">*</span></label>
                    <input type="email" id="email" name="email" autocomplete="email" required />
                    <span class="err-msg">Please enter a valid email address.</span>
                  </div>
                </div>
                <div class="form-row">
                  <div class="field">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel" />
                    <span class="err-msg">Please enter a valid phone number.</span>
                  </div>
                  <div class="field">
                    <label for="company">Company</label>
                    <input type="text" id="company" name="company" autocomplete="organization" />
                    <span class="err-msg"></span>
                  </div>
                </div>
                <div class="form-row">
                  <div class="field full">
                    <label for="message">Message <span class="req">*</span></label>
                    <textarea id="message" name="message" required placeholder="Tell us about your facility size, ceiling height, and airflow needs…"></textarea>
                    <span class="err-msg">Please tell us a bit about your project.</span>
                  </div>
                </div>
                <button type="submit" class="btn btn--dark form-submit" id="submitBtn">
                  <span class="btn-label">Send Enquiry <i class="fa-solid fa-paper-plane" aria-hidden="true"></i></span>
                </button>
              </form>
            </div>
          </div>
        `;

        const form = section.querySelector('#contactForm');
        const submitBtn = section.querySelector('#submitBtn');
        const formSuccess = section.querySelector('#formSuccess');

        function setFieldInvalid(id, invalid) {
          const field = section.querySelector(`#${id}`)?.closest('.field');
          if (field) field.classList.toggle('invalid', invalid);
        }

        function validate() {
          let ok = true;
          const name = section.querySelector('#name').value.trim();
          const email = section.querySelector('#email').value.trim();
          const phone = section.querySelector('#phone').value.trim();
          const message = section.querySelector('#message').value.trim();
          const nameOk = name.length >= 2;
          setFieldInvalid('name', !nameOk);
          ok &&= nameOk;
          const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          setFieldInvalid('email', !emailOk);
          ok &&= emailOk;
          const phoneOk = !phone || phone.replace(/[\s\-()]/g, '').length >= 7;
          setFieldInvalid('phone', !phoneOk);
          ok &&= phoneOk;
          const msgOk = message.length >= 10;
          setFieldInvalid('message', !msgOk);
          ok &&= msgOk;
          return ok;
        }

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          formSuccess.classList.remove('show');
          if (!validate()) return;
          submitBtn.disabled = true;
          submitBtn.querySelector('.btn-label').innerHTML = '<span class="spinner"></span> Sending…';
          setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.querySelector('.btn-label').innerHTML =
              'Send Enquiry <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>';
            formSuccess.classList.add('show');
            form.reset();
            formSuccess.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 1400);
        });

        form.querySelectorAll('input, textarea').forEach(el => {
          el.addEventListener('input', () => {
            const field = el.closest('.field');
            if (field) field.classList.remove('invalid');
          });
        });

        return section;
      }

      function Footer() {
        const footer = document.createElement('footer');
        footer.className = 'footer';
        footer.innerHTML = `
          <div class="container">
            <div class="footer-bottom">
              <p>© <span id="year"></span> AXTELL FAN Co., Ltd. All rights reserved.</p>
              <span class="made">Built for <span>industrial performance</span></span>
            </div>
          </div>
        `;
        const yearSpan = footer.querySelector('#year');
        if (yearSpan) yearSpan.textContent = new Date().getFullYear();
        return footer;
      }


      // ============================================================
      // 5. APP 初始化
      // ============================================================

      function App(root) {
        const app = document.createElement('div');
        app.className = 'app';

        const header = Header();
        const hero = Hero();
        const features = Features();
        const products = Products();
        const specs = Specifications();
        const apps = Applications();
        const contact = Contact();
        const footer = Footer();

        app.append(header, hero, features, products, specs, apps, contact, footer);
        root.appendChild(app);

        requestAnimationFrame(() => {
          useReveal('.reveal');
          useScrollHeader('#header');
          useMobileMenu('#navToggle', '#navLinks');

          function updateActive() {
            const sections = document.querySelectorAll('section[id]');
            let current = 'home';
            const y = window.scrollY + 100;
            sections.forEach(s => { if (s.offsetTop <= y) current = s.id; });
            document.querySelectorAll('.nav-links > li > a, .nav-links > li > button').forEach(l => {
              const target = l.getAttribute('data-target') || '';
              l.classList.toggle('active', target === current);
            });
          }
          window.addEventListener('scroll', updateActive, { passive: true });
          updateActive();

          document.querySelectorAll('[data-filter]').forEach(el => {
            if (el.classList.contains('tab')) return;
            el.addEventListener('click', (e) => {
              const filter = el.dataset.filter;
              if (filter) {
                e.preventDefault();
                const productsSection = document.querySelector('#products');
                if (productsSection && typeof productsSection._setFilter === 'function') {
                  productsSection._setFilter(filter);
                }
                const menu = document.querySelector('#navLinks');
                const toggle = document.querySelector('#navToggle');
                if (menu) menu.classList.remove('mobile-open');
                if (toggle) {
                  toggle.setAttribute('aria-expanded', 'false');
                  const icon = toggle.querySelector('i');
                  if (icon) icon.className = 'fa-solid fa-bars';
                }
                document.querySelector('#products').scrollIntoView({ behavior: 'smooth' });
              }
            });
          });
        });
      }

      const root = document.getElementById('app');
      App(root);

    })();
  </script>
</body>
